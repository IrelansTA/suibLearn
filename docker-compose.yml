version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sublearn-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      - media-data:/data/sublearn/media
    environment:
      - MEDIA_DIR=/data/sublearn/media
      - DATABASE_PATH=/app/data/sublearn.db
    expose:
      - "8000"

  frontend:
    image: nginx:alpine
    container_name: sublearn-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media-data:/data/sublearn/media:ro
    depends_on:
      - backend

volumes:
  backend-data:
  media-data: