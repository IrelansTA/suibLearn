server {
    listen 80;
    server_name _;

    # Max upload size (video files up to 1GB + overhead)
    client_max_body_size 1100M;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload timeout (large files)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;
    }

    # Video media files - served directly by Nginx (not proxied to Python)
    location /media/ {
        alias /data/sublearn/media/;

        # Support Range requests for video seeking
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin *;

        # Proper MIME types for video files
        types {
            video/mp4 mp4;
            video/x-matroska mkv;
            video/webm webm;
        }

        # Enable sendfile for efficient file serving
        sendfile on;
        tcp_nopush on;

        # Cache static media files in browser
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
